<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-gradient); }
        .login-card { width: 100%; max-width: 400px; padding: 2.5rem; background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <main class="login-card">
        <header style="text-align:center; margin-bottom:2rem;">
            <div style="background:var(--primary); width:60px; height:60px; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; color:white; box-shadow:0 10px 15px -3px rgba(37,99,235,0.4);">
                <i data-lucide="shield-check" size="32"></i>
            </div>
            <h1>Bienvenido</h1>
            <p class="subtitle">Ingrese al panel de administración</p>
        </header>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" style="margin-top:1rem;">
                Iniciar Sesión
            </button>
        </form>
        
        <script>
            lucide.createIcons();
            // Handle error messages from URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                const p = document.createElement('p');
                p.style = "color:#ef4444; font-size:0.875rem; text-align:center; margin-top:1rem;";
                p.textContent = "Credenciales incorrectas. Intente de nuevo.";
                document.querySelector('form').appendChild(p);
            }
        </script>
    </main>
</body>
</html>
